<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DustyLM — Browser Demo</title>
  <meta name="description"
    content="Chat with DustyLM, an 8M parameter language model running entirely in your browser via WebAssembly. No server, no API key.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.23.0/dist/ort.min.js"></script>
  <style>
    :root {
      color-scheme: light;
      --bg: #fbfbfc;
      --panel: #ffffff;
      --surface: #f5f6f8;
      --surface-strong: #eef0f3;
      --line: #e8ebf0;
      --line-strong: #dde2e8;
      --text: #20242c;
      --text-secondary: #687181;
      --text-dim: #a6adba;
      --accent: #14d8c4;
      --accent-dark: #0f9f91;
      --accent-soft: rgba(20, 216, 196, 0.12);
      --green: #21c58b;
      --blue: #5578c6;
      --red: #dc3545;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
    }

    body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif;
      display: grid;
      place-items: center;
      padding: 28px;
      overflow: auto;
    }

    .container {
      width: min(980px, calc(100vw - 56px));
      height: min(820px, calc(100vh - 56px));
      min-height: 640px;
    }

    .chat {
      width: 100%;
      height: 100%;
      background: transparent;
      display: grid;
      grid-template-rows: auto 1fr auto auto auto;
      overflow: visible;
    }

    .header {
      min-height: 48px;
      padding: 0 2px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      background: transparent;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .logo-mark {
      width: 30px;
      height: 30px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
    }

    .logo {
      width: 28px;
      height: 28px;
      object-fit: contain;
      display: block;
    }

    .title {
      font-size: 21px;
      line-height: 1.1;
      font-weight: 800;
      letter-spacing: 0;
      color: var(--text);
      white-space: nowrap;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-dim);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #f59e0b;
      box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.12);
      animation: pulse 1.8s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
        transform: scale(1);
      }

      50% {
        opacity: 0.45;
        transform: scale(0.82);
      }
    }

    .status.ready .dot {
      background: var(--green);
      box-shadow: 0 0 0 3px rgba(33, 197, 139, 0.14);
      animation: none;
    }

    .status.ready {
      color: #9aa2af;
    }

    .status.error .dot {
      background: var(--red);
      box-shadow: 0 0 0 3px rgba(220, 53, 69, 0.12);
      animation: none;
    }

    .messages {
      position: relative;
      min-height: 0;
      overflow-y: auto;
      padding: 28px 96px 24px;
      background: transparent;
      font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar {
      width: 6px;
    }

    .messages::-webkit-scrollbar-thumb {
      background: var(--line-strong);
      border-radius: 999px;
    }

    .empty-state {
      min-height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 8px 0 8px;
      color: var(--text-dim);
    }

    .empty-state-card {
      width: 190px;
      height: 190px;
      display: grid;
      place-items: center;
      margin-bottom: 26px;
    }

    .empty-state-icon {
      width: 180px;
      height: 180px;
      object-fit: contain;
      opacity: 1;
    }

    .empty-state h2 {
      max-width: 520px;
      font-size: 22px;
      line-height: 1.25;
      font-weight: 800;
      color: #687181;
      letter-spacing: 0;
      margin-bottom: 10px;
    }

    .empty-state p {
      max-width: 520px;
      color: #a6adba;
      font-size: 15px;
      line-height: 1.55;
      font-weight: 600;
    }

    .turn {
      max-width: 76%;
      margin: 0 0 16px;
      padding: 12px 15px;
      border-radius: 14px;
      border: 1px solid var(--line);
      animation: turnIn 0.25s ease both;
    }

    @keyframes turnIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .turn.user-turn {
      margin-left: auto;
      background: #f4f8ff;
      border-color: rgba(85, 120, 198, 0.14);
    }

    .turn.dusty-turn {
      margin-right: auto;
      background: var(--surface);
    }

    .speaker {
      display: block;
      margin-bottom: 4px;
      font-size: 11px;
      line-height: 1.2;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .speaker.user {
      color: var(--blue);
    }

    .speaker.dusty {
      color: var(--accent-dark);
    }

    .turn-text {
      color: var(--text);
      font-family: inherit;
      font-size: 15px;
      line-height: 1.6;
      font-weight: 500;
      white-space: pre-wrap;
    }

    .suggestions {
      width: min(670px, calc(100% - 48px));
      margin: 0 auto;
      padding: 0 0 20px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      background: transparent;
    }

    .suggestions button {
      min-height: 52px;
      border: 0;
      border-radius: 999px;
      background: var(--surface);
      color: #697180;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 0 18px;
      cursor: pointer;
      transition: background 0.18s ease, color 0.18s ease, transform 0.18s ease;
    }

    .suggestions button:hover:not(:disabled) {
      background: var(--surface-strong);
      color: var(--text);
      transform: translateY(-1px);
    }

    .suggestions button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .suggestions .icon {
      width: 22px;
      height: 22px;
      color: #9aa2af;
      line-height: 1;
      flex: 0 0 auto;
      display: inline-grid;
      place-items: center;
    }

    .suggestions .icon svg {
      width: 20px;
      height: 20px;
      display: block;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .input-area {
      width: min(760px, calc(100% - 64px));
      margin: 0 auto;
      padding: 0 0 8px;
      background: transparent;
    }

    form {
      display: flex;
      align-items: center;
      gap: 10px;
      height: 64px;
      padding: 0 14px 0 18px;
      border: 1px solid var(--line-strong);
      border-radius: 9px;
      background: #fff;
      box-shadow: 0 2px 8px rgba(22, 28, 36, 0.04);
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    form:focus-within {
      border-color: rgba(20, 216, 196, 0.65);
      box-shadow: 0 0 0 3px var(--accent-soft), 0 2px 10px rgba(22, 28, 36, 0.04);
    }

    input {
      flex: 1;
      min-width: 0;
      height: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      font-weight: 500;
    }

    input::placeholder {
      color: #b5bcc8;
      opacity: 1;
    }

    .send-btn {
      width: 44px;
      height: 44px;
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: var(--accent);
      font-family: 'Inter', sans-serif;
      font-size: 0;
      font-weight: 800;
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: transform 0.18s ease, color 0.18s ease, background 0.18s ease;
    }

    .send-btn::before {
      content: '➤';
      font-size: 30px;
      line-height: 1;
      transform: translateX(1px);
    }

    .send-btn:hover:not(:disabled) {
      color: var(--accent-dark);
      background: var(--accent-soft);
      transform: translateX(2px);
    }

    button:disabled,
    input:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    .speed-readout {
      padding: 0 24px 10px;
      text-align: center;
      color: #b5bcc8;
      font-size: 12px;
      font-weight: 600;
    }

    .fine-print {
      padding: 0 24px 26px;
      text-align: center;
      color: #aeb5c0;
      font-size: 13px;
      font-weight: 600;
    }

    @media (max-width: 720px) {
      body {
        padding: 12px;
      }

      .container {
        width: 100%;
        height: calc(100vh - 24px);
        min-height: 0;
      }

      .header {
        padding: 0;
        min-height: 44px;
      }

      .title {
        font-size: 19px;
      }

      .logo-mark {
        width: 28px;
        height: 28px;
      }

      .logo {
        width: 26px;
        height: 26px;
      }

      .status {
        font-size: 11px;
      }

      .messages {
        padding: 24px 18px 18px;
        font-size: 14px;
      }

      .empty-state-card {
        width: 150px;
        height: 150px;
      }

      .empty-state-icon {
        width: 144px;
        height: 144px;
      }

      .empty-state h2 {
        font-size: 19px;
      }

      .suggestions {
        width: calc(100% - 28px);
        grid-template-columns: 1fr;
        gap: 10px;
        padding-bottom: 14px;
      }

      .suggestions button {
        min-height: 46px;
        font-size: 14px;
      }

      .input-area {
        width: calc(100% - 28px);
      }

      form {
        height: 56px;
      }

      input {
        font-size: 15px;
      }

      .turn {
        max-width: 90%;
      }

      .speed-readout {
        padding-bottom: 8px;
      }

      .fine-print {
        padding-bottom: 18px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <section class="chat" aria-label="DustyLM chat">
      <header class="header">
        <div class="brand">
          <span class="logo-mark">
            <img class="logo" src="images/logo.png" alt="DustyLM logo">
          </span>
          <h1 class="title">DustyLM</h1>
        </div>
        <div id="status" class="status"><span class="dot"></span><span>loading</span></div>
      </header>

      <div id="messages" class="messages">
        <div class="empty-state" id="empty-state">
          <div class="empty-state-card">
            <img class="empty-state-icon" src="images/logo.png" alt="">
          </div>
          <h2>Runs entirely in your browser.</h2>
          <p>DustyLM is an 8M parameter language model. No server, no API key, no data leaves this page.</p>
        </div>
      </div>
      <div class="suggestions" id="suggestions">
        <button type="button" data-prompt="who are you?" disabled><span class="icon" aria-hidden="true"><svg
              viewBox="0 0 24 24">
              <path d="M20 21a8 8 0 0 0-16 0" />
              <circle cx="12" cy="8" r="4" />
            </svg></span> who are you?</button>
        <button type="button" data-prompt="are you scared?" disabled><span class="icon" aria-hidden="true"><svg
              viewBox="0 0 24 24">
              <path d="M12 9v4" />
              <path d="M12 17h.01" />
              <path d="M10.3 3.9 2.8 17a2 2 0 0 0 1.7 3h15a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0Z" />
            </svg></span> are you scared?</button>
        <button type="button" data-prompt="what do you dream about?" disabled><span class="icon" aria-hidden="true"><svg
              viewBox="0 0 24 24">
              <path d="M12 3a6.8 6.8 0 1 0 7.8 9.2A8.4 8.4 0 0 1 12 3Z" />
              <path d="M19 3v4" />
              <path d="M21 5h-4" />
            </svg></span> what do you dream about?</button>
        <button type="button" data-prompt="what makes you happy?" disabled><span class="icon" aria-hidden="true"><svg
              viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="9" />
              <path d="M8 14s1.5 2 4 2 4-2 4-2" />
              <path d="M9 9h.01" />
              <path d="M15 9h.01" />
            </svg></span> what makes you happy?</button>
      </div>
      <div class="input-area">
        <form id="chat-form">
          <input id="prompt" autocomplete="off" placeholder="Say something to Dusty..." disabled>
          <button id="send" class="send-btn" type="submit" disabled>Send</button>
        </form>
      </div>
      <p id="speed-readout" class="speed-readout">Generation speed appears here after Dusty replies.</p>
      <p class="fine-print">DustyLM may display inaccurate info. Verify outputs.</p>
    </section>
  </div>

  <script>
    /* ── Config ── */
    const MODEL_PATH = "model.onnx";
    const TOKENIZER_PATH = "tokenizer.json";
    const MAX_SEQ_LEN = 256;
    const MAX_NEW_TOKENS = 64;
    const TOP_K = 5;
    const TOP_P = 0.8;
    const TEMPERATURE = 0.6;
    const IM_START = "<|im_start|>";
    const IM_END = "<|im_end|>";

    const statusEl = document.getElementById("status");
    const messagesEl = document.getElementById("messages");
    const formEl = document.getElementById("chat-form");
    const promptEl = document.getElementById("prompt");
    const sendEl = document.getElementById("send");
    const speedEl = document.getElementById("speed-readout");

    let session;
    let tokenizer;
    let imEndId;

    function setStatus(text, ready = false) {
      statusEl.classList.toggle("ready", ready);
      statusEl.querySelector("span:last-child").textContent = text;
    }

    /* ── Tokenizer ── */
    function bytesToUnicode() {
      const bs = [];
      for (let i = 33; i <= 126; i++) bs.push(i);
      for (let i = 161; i <= 172; i++) bs.push(i);
      for (let i = 174; i <= 255; i++) bs.push(i);
      const cs = bs.slice();
      let n = 0;
      for (let b = 0; b < 256; b++) {
        if (!bs.includes(b)) {
          bs.push(b);
          cs.push(256 + n);
          n++;
        }
      }
      const encoder = new Map();
      const decoder = new Map();
      for (let i = 0; i < bs.length; i++) {
        const ch = String.fromCodePoint(cs[i]);
        encoder.set(bs[i], ch);
        decoder.set(ch, bs[i]);
      }
      return { encoder, decoder };
    }

    class ByteLevelBPETokenizer {
      constructor(config) {
        this.vocab = config.model.vocab;
        this.idToToken = new Map(Object.entries(this.vocab).map(([token, id]) => [id, token]));
        this.specialTokens = new Map((config.added_tokens || []).map((token) => [token.content, token.id]));
        this.byteMaps = bytesToUnicode();
        this.encoder = new TextEncoder();
        this.decoder = new TextDecoder("utf-8");
        this.cache = new Map();
        this.ranks = new Map();
        for (let i = 0; i < config.model.merges.length; i++) {
          const merge = config.model.merges[i];
          const pair = Array.isArray(merge) ? merge.join(" ") : merge;
          this.ranks.set(pair, i);
        }
        this.pattern = /'s|'t|'re|'ve|'m|'ll|'d| ?[\p{L}]+| ?[\p{N}]+| ?[^\s\p{L}\p{N}]+|\s+(?!\S)|\s+/gu;
      }

      tokenToId(token) {
        return this.specialTokens.get(token) ?? this.vocab[token];
      }

      splitSpecial(text) {
        const specials = [...this.specialTokens.keys()].sort((a, b) => b.length - a.length);
        const parts = [];
        let index = 0;
        while (index < text.length) {
          let matched = null;
          for (const special of specials) {
            if (text.startsWith(special, index)) {
              matched = special;
              break;
            }
          }
          if (matched) {
            parts.push({ special: true, text: matched });
            index += matched.length;
            continue;
          }
          let next = text.length;
          for (const special of specials) {
            const found = text.indexOf(special, index);
            if (found !== -1 && found < next) next = found;
          }
          parts.push({ special: false, text: text.slice(index, next) });
          index = next;
        }
        return parts;
      }

      encode(text) {
        const ids = [];
        for (const part of this.splitSpecial(text)) {
          if (part.special) {
            ids.push(this.specialTokens.get(part.text));
            continue;
          }

          const words = part.text.match(this.pattern) || [];
          for (const word of words) {
            const chars = [...this.encoder.encode(word)].map((byte) => this.byteMaps.encoder.get(byte)).join("");
            for (const token of this.bpe(chars).split(" ")) {
              const id = this.vocab[token];
              if (id !== undefined) ids.push(id);
            }
          }
        }
        return ids;
      }

      bpe(token) {
        if (this.cache.has(token)) return this.cache.get(token);
        let word = [...token];
        if (word.length === 1) return token;

        while (true) {
          let bestPair = null;
          let bestRank = Infinity;
          for (let i = 0; i < word.length - 1; i++) {
            const pair = `${word[i]} ${word[i + 1]}`;
            const rank = this.ranks.get(pair);
            if (rank !== undefined && rank < bestRank) {
              bestRank = rank;
              bestPair = [word[i], word[i + 1]];
            }
          }
          if (!bestPair) break;

          const nextWord = [];
          for (let i = 0; i < word.length; i++) {
            if (i < word.length - 1 && word[i] === bestPair[0] && word[i + 1] === bestPair[1]) {
              nextWord.push(bestPair[0] + bestPair[1]);
              i++;
            } else {
              nextWord.push(word[i]);
            }
          }
          word = nextWord;
          if (word.length === 1) break;
        }

        const result = word.join(" ");
        this.cache.set(token, result);
        return result;
      }

      decode(ids) {
        const bytes = [];
        for (const id of ids) {
          const token = this.idToToken.get(id);
          if (!token || this.specialTokens.has(token)) continue;
          for (const ch of [...token]) {
            const byte = this.byteMaps.decoder.get(ch);
            if (byte !== undefined) bytes.push(byte);
          }
        }
        return this.decoder.decode(new Uint8Array(bytes));
      }
    }

    /* ── Sampling ── */
    function softmax(logits) {
      const max = Math.max(...logits);
      const exps = logits.map((x) => Math.exp(x - max));
      const sum = exps.reduce((a, b) => a + b, 0);
      return exps.map((x) => x / sum);
    }

    function sampleNextToken(logits) {
      const scaled = Array.from(logits, (x) => x / TEMPERATURE);
      const top = scaled
        .map((value, index) => ({ value, index }))
        .sort((a, b) => b.value - a.value)
        .slice(0, TOP_K);

      const probs = softmax(top.map((item) => item.value));
      let cumulative = 0;
      const nucleus = [];
      for (let i = 0; i < top.length; i++) {
        cumulative += probs[i];
        nucleus.push({ index: top[i].index, probability: probs[i] });
        if (cumulative >= TOP_P && nucleus.length > 1) break;
      }

      const total = nucleus.reduce((sum, item) => sum + item.probability, 0);
      let draw = Math.random() * total;
      for (const item of nucleus) {
        draw -= item.probability;
        if (draw <= 0) return item.index;
      }
      return nucleus[nucleus.length - 1].index;
    }

    function chatTemplate(prompt) {
      return `${IM_START}user\n${prompt}${IM_END}\n${IM_START}assistant\n`;
    }

    /* ── Model ── */
    async function runModel(ids) {
      const cropped = ids.slice(-MAX_SEQ_LEN);
      const input = BigInt64Array.from(cropped, (id) => BigInt(id));
      const tensor = new ort.Tensor("int64", input, [1, cropped.length]);
      const feeds = { input_ids: tensor };
      const results = await session.run(feeds);
      return results.logits;
    }

    async function generate(prompt) {
      const ids = tokenizer.encode(chatTemplate(prompt));
      const generated = [];
      const startTime = performance.now();

      for (let step = 0; step < MAX_NEW_TOKENS; step++) {
        const logitsTensor = await runModel(ids.concat(generated));
        const vocabSize = logitsTensor.dims[2];
        const start = (logitsTensor.dims[1] - 1) * vocabSize;
        const logits = logitsTensor.data.slice(start, start + vocabSize);
        const nextId = sampleNextToken(logits);
        if (nextId === imEndId) break;
        generated.push(nextId);
      }

      const elapsedSeconds = Math.max((performance.now() - startTime) / 1000, 0.001);
      return {
        text: tokenizer.decode(generated).trim(),
        tokenCount: generated.length,
        tokensPerSecond: generated.length / elapsedSeconds,
      };
    }

    /* ── UI ── */
    function appendTurn(speaker, text) {
      const div = document.createElement("div");
      const isUser = speaker === "You";
      div.className = `turn ${isUser ? 'user-turn' : 'dusty-turn'}`;
      const labelClass = isUser ? "speaker user" : "speaker dusty";
      div.innerHTML = `<span class="${labelClass}">${speaker}</span><span class="turn-text">${escapeHtml(text)}</span>`;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    function escapeHtml(text) {
      return text.replace(/[&<>"']/g, (ch) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;",
      }[ch]));
    }

    async function handlePrompt(prompt) {
      const cleaned = prompt.trim();
      if (!cleaned || sendEl.disabled) return;
      hideEmptyState();
      promptEl.value = "";
      promptEl.disabled = true;
      sendEl.disabled = true;
      document.querySelectorAll("[data-prompt]").forEach(b => b.disabled = true);
      appendTurn("You", cleaned);
      const pending = appendTurn("Dusty", "…");
      try {
        speedEl.textContent = "Measuring Dusty's token speed...";
        const result = await generate(cleaned);
        pending.querySelector('.turn-text').textContent = result.text || "beep.";
        if (result.tokenCount > 0) {
          speedEl.textContent = `Generated ${result.tokenCount} tokens at ${Math.round(result.tokensPerSecond)} tokens/sec`;
        } else {
          speedEl.textContent = "Generation speed unavailable.";
        }
      } catch (error) {
        pending.querySelector('.turn-text').textContent = "beep. something is stuck.";
        speedEl.textContent = "Generation speed unavailable.";
        console.error(error);
      } finally {
        promptEl.disabled = false;
        sendEl.disabled = false;
        document.querySelectorAll("[data-prompt]").forEach(b => b.disabled = false);
        promptEl.focus();
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }
    }

    async function init() {
      try {
        setStatus("loading tokenizer…");
        const tokenizerConfig = await fetch(TOKENIZER_PATH).then((res) => res.json());
        tokenizer = new ByteLevelBPETokenizer(tokenizerConfig);
        imEndId = tokenizer.tokenToId(IM_END);

        setStatus("loading model…");
        ort.env.wasm.numThreads = 1;
        session = await ort.InferenceSession.create(MODEL_PATH, {
          executionProviders: ["wasm"],
          graphOptimizationLevel: "all",
        });

        setStatus("ready", true);
        promptEl.disabled = false;
        sendEl.disabled = false;
        document.querySelectorAll("[data-prompt]").forEach(b => b.disabled = false);
        promptEl.focus();
      } catch (error) {
        setStatus("failed to load");
        statusEl.classList.add("error");
        hideEmptyState();
        appendTurn("Dusty", "beep. my browser wheels are stuck.");
        console.error(error);
      }
    }

    function hideEmptyState() {
      const el = document.getElementById('empty-state');
      if (el) {
        el.style.transition = 'opacity 0.3s ease';
        el.style.opacity = '0';
        setTimeout(() => el.remove(), 300);
      }
    }

    formEl.addEventListener("submit", (event) => {
      event.preventDefault();
      handlePrompt(promptEl.value);
    });

    document.querySelectorAll("[data-prompt]").forEach((button) => {
      button.addEventListener("click", () => {
        promptEl.value = button.dataset.prompt;
        handlePrompt(button.dataset.prompt);
      });
    });

    init();
  </script>
</body>

</html>
