<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DustyLM — Browser Demo</title>
  <meta name="description"
    content="Chat with DustyLM, an 8M parameter language model running entirely in your browser via WebAssembly. No server, no API key.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.23.0/dist/ort.min.js"></script>
  <style>
    :root {
      color-scheme: light;
      --bg: #ffffff;
      --bg-subtle: #f8f9fb;
      --panel: #ffffff;
      --glass: rgba(255, 255, 255, 0.8);
      --line: rgba(0, 0, 0, 0.08);
      --line-solid: #e2e5ea;
      --text: #1a1d23;
      --text-secondary: #4a5060;
      --text-dim: #8891a0;
      --accent: #e8820e;
      --accent-soft: rgba(232, 130, 14, 0.1);
      --teal: #0d9488;
      --teal-soft: rgba(13, 148, 136, 0.08);
      --teal-glow: rgba(13, 148, 136, 0.15);
      --blue: #3b7dd8;
      --blue-soft: rgba(59, 125, 216, 0.07);
      --red: #dc3545;
      --radius: 20px;
      --radius-sm: 12px;
      --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.06);
      --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.06), 0 1px 4px rgba(0, 0, 0, 0.04);
      --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.08), 0 2px 8px rgba(0, 0, 0, 0.04);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Subtle background pattern */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 50% at 15% 5%, rgba(13, 148, 136, 0.04) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 85% 95%, rgba(59, 125, 216, 0.03) 0%, transparent 60%),
        radial-gradient(ellipse 50% 35% at 50% 50%, rgba(232, 130, 14, 0.02) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
      animation: bgShift 25s ease-in-out infinite alternate;
    }

    @keyframes bgShift {
      0% {
        opacity: 0.7;
        transform: scale(1);
      }

      100% {
        opacity: 1;
        transform: scale(1.05);
      }
    }

    /* Dust particles — subtle on light */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: rgba(13, 148, 136, 0.15);
      animation: float linear infinite;
    }

    @keyframes float {
      0% {
        transform: translateY(100vh) translateX(0) scale(0);
        opacity: 0;
      }

      10% {
        opacity: 0.6;
        transform: translateY(90vh) translateX(10px) scale(1);
      }

      90% {
        opacity: 0.3;
      }

      100% {
        transform: translateY(-10vh) translateX(-20px) scale(0.3);
        opacity: 0;
      }
    }

    /* Main container */
    .container {
      position: relative;
      z-index: 1;
      width: min(800px, calc(100vw - 48px));
      max-height: calc(100vh - 48px);
      display: flex;
      flex-direction: column;
      animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(24px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Header */
    .header {
      text-align: center;
      padding: 0 0 20px;
      flex-shrink: 0;
    }

    .logo {
      width: min(260px, 55vw);
      margin: 0 auto 10px;
      display: block;
      animation: logoFloat 6s ease-in-out infinite;
    }

    @keyframes logoFloat {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-5px);
      }
    }

    .title {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -0.025em;
      color: var(--text);
      line-height: 1.1;
    }

    .tagline {
      color: var(--text-dim);
      font-size: 14px;
      font-weight: 500;
      margin-top: 6px;
      letter-spacing: 0.01em;
    }

    /* Status pill */
    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      padding: 6px 16px;
      border-radius: 100px;
      background: var(--bg-subtle);
      border: 1px solid var(--line-solid);
      font-size: 13px;
      font-weight: 500;
      color: var(--text-dim);
      transition: all 0.5s ease;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent-soft);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
        transform: scale(1);
      }

      50% {
        opacity: 0.4;
        transform: scale(0.8);
      }
    }

    .status.ready .dot {
      background: #10b981;
      box-shadow: 0 0 8px rgba(16, 185, 129, 0.3);
      animation: none;
    }

    .status.ready {
      border-color: rgba(16, 185, 129, 0.3);
      background: rgba(16, 185, 129, 0.06);
      color: #047857;
    }

    .status.error .dot {
      background: var(--red);
      box-shadow: 0 0 8px rgba(220, 53, 69, 0.2);
      animation: none;
    }

    /* Top-left info */
    .top-info {
      position: fixed;
      top: 16px;
      left: 20px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-dim);
      opacity: 0.55;
      z-index: 2;
      letter-spacing: 0.01em;
    }

    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      text-align: center;
      animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .empty-state-icon {
      width: 80px;
      height: 80px;
      margin-bottom: 16px;
      opacity: 0.15;
    }

    .empty-state h2 {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
      letter-spacing: -0.01em;
    }

    .empty-state p {
      font-size: 14px;
      color: var(--text-dim);
      max-width: 320px;
      line-height: 1.5;
    }

    /* Chat panel */
    .chat {
      background: var(--panel);
      border: 1px solid var(--line-solid);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow-lg);
      display: flex;
      flex-direction: column;
      min-height: 0;
      flex: 1;
    }

    .messages {
      flex: 1;
      min-height: 260px;
      max-height: 54vh;
      overflow-y: auto;
      padding: 24px 28px;
      background: var(--bg-subtle);
      font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;
      font-size: 14px;
      line-height: 1.65;
      white-space: pre-wrap;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar {
      width: 6px;
    }

    .messages::-webkit-scrollbar-track {
      background: transparent;
    }

    .messages::-webkit-scrollbar-thumb {
      background: var(--line-solid);
      border-radius: 3px;
    }

    .turn {
      margin: 0 0 14px;
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      animation: turnIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes turnIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .turn.user-turn {
      background: var(--blue-soft);
      border: 1px solid rgba(59, 125, 216, 0.12);
    }

    .turn.dusty-turn {
      background: #ffffff;
      border: 1px solid var(--line-solid);
      box-shadow: var(--shadow-sm);
    }

    .speaker {
      font-weight: 700;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      display: block;
      margin-bottom: 4px;
    }

    .speaker.dusty {
      color: var(--teal);
    }

    .speaker.user {
      color: var(--blue);
    }

    .turn-text {
      color: var(--text);
      font-weight: 400;
    }

    /* Input area */
    .input-area {
      border-top: 1px solid var(--line-solid);
      padding: 16px 20px;
      background: var(--panel);
    }

    form {
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      min-width: 0;
      height: 44px;
      border: 1px solid var(--line-solid);
      border-radius: var(--radius-sm);
      background: var(--bg-subtle);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 500;
      padding: 0 14px;
      outline: none;
      transition: border-color 0.25s ease, box-shadow 0.25s ease;
    }

    input:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px var(--teal-soft);
      background: #ffffff;
    }

    input::placeholder {
      color: var(--text-dim);
      opacity: 0.7;
    }

    button.send-btn {
      height: 44px;
      border: 0;
      border-radius: var(--radius-sm);
      background: var(--teal);
      color: #ffffff;
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.03em;
      padding: 0 22px;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 2px 8px rgba(13, 148, 136, 0.2);
    }

    button.send-btn:hover:not(:disabled) {
      background: #0f766e;
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(13, 148, 136, 0.25);
    }

    button.send-btn:active:not(:disabled) {
      transform: translateY(0);
    }

    button:disabled,
    input:disabled {
      cursor: not-allowed;
      opacity: 0.4;
    }

    /* Suggestions */
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 14px 20px;
      background: var(--panel);
      border-top: 1px solid var(--line);
    }

    .suggestions button {
      height: 34px;
      background: var(--bg-subtle);
      color: var(--text-secondary);
      border: 1px solid var(--line-solid);
      border-radius: 100px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      padding: 0 14px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .suggestions button:hover:not(:disabled) {
      color: var(--teal);
      border-color: var(--teal);
      background: var(--teal-soft);
      transform: translateY(-1px);
      box-shadow: var(--shadow-sm);
    }

    .suggestions button:disabled {
      cursor: not-allowed;
      opacity: 0.4;
    }


    @media (max-height: 700px) {
      .logo {
        width: min(180px, 40vw);
        margin-bottom: 8px;
      }

      .title {
        font-size: 26px;
      }

      .header {
        padding-bottom: 12px;
      }

      .messages {
        max-height: 42vh;
        min-height: 160px;
      }

      .top-info {
        display: none;
      }
    }

    @media (max-width: 480px) {
      .container {
        width: calc(100vw - 24px);
      }

      .logo {
        width: min(200px, 50vw);
      }

      .title {
        font-size: 26px;
      }

      .messages {
        padding: 18px 18px;
        font-size: 13px;
      }
    }
  </style>
</head>

<body>
  <p class="top-info">Runs entirely via WebAssembly · No server · No API key</p>

  <!-- Floating dust particles -->
  <div class="particles" id="particles"></div>

  <div class="container">
    <header class="header">
      <img class="logo" src="images/logo.png" alt="DustyLM logo">
      <h1 class="title">DustyLM</h1>
      <p class="tagline">8M parameter language model · running in your browser · no server required</p>
      <div id="status" class="status"><span class="dot"></span><span>loading model…</span></div>
    </header>

    <section class="chat" aria-label="DustyLM chat">
      <div id="messages" class="messages">
        <div class="empty-state" id="empty-state">
          <img class="empty-state-icon" src="images/logo.png" alt="">
          <h2>Talk to Dusty</h2>
          <p>Ask the tiny vacuum robot anything — it runs entirely in your browser.</p>
        </div>
      </div>
      <div class="suggestions" id="suggestions">
        <button type="button" data-prompt="who are you?" disabled>who are you?</button>
        <button type="button" data-prompt="are you scared?" disabled>are you scared?</button>
        <button type="button" data-prompt="what do you dream about?" disabled>what do you dream about?</button>
        <button type="button" data-prompt="what makes you happy?" disabled>what makes you happy?</button>
      </div>
      <div class="input-area">
        <form id="chat-form">
          <input id="prompt" autocomplete="off" placeholder="ask dusty something…" disabled>
          <button id="send" class="send-btn" type="submit" disabled>Send</button>
        </form>
      </div>
    </section>
  </div>

  <script>
    /* ── Particles ── */
    (function initParticles() {
      const container = document.getElementById('particles');
      const count = 18;
      for (let i = 0; i < count; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.animationDuration = (12 + Math.random() * 18) + 's';
        p.style.animationDelay = (Math.random() * 15) + 's';
        p.style.width = p.style.height = (2 + Math.random() * 3) + 'px';
        p.style.opacity = 0.15 + Math.random() * 0.2;
        container.appendChild(p);
      }
    })();

    /* ── Config ── */
    const MODEL_PATH = "model.onnx";
    const TOKENIZER_PATH = "tokenizer.json";
    const MAX_SEQ_LEN = 256;
    const MAX_NEW_TOKENS = 64;
    const TOP_K = 5;
    const TOP_P = 0.8;
    const TEMPERATURE = 0.6;
    const IM_START = "<|im_start|>";
    const IM_END = "<|im_end|>";

    const statusEl = document.getElementById("status");
    const messagesEl = document.getElementById("messages");
    const formEl = document.getElementById("chat-form");
    const promptEl = document.getElementById("prompt");
    const sendEl = document.getElementById("send");

    let session;
    let tokenizer;
    let imEndId;

    function setStatus(text, ready = false) {
      statusEl.classList.toggle("ready", ready);
      statusEl.querySelector("span:last-child").textContent = text;
    }

    /* ── Tokenizer ── */
    function bytesToUnicode() {
      const bs = [];
      for (let i = 33; i <= 126; i++) bs.push(i);
      for (let i = 161; i <= 172; i++) bs.push(i);
      for (let i = 174; i <= 255; i++) bs.push(i);
      const cs = bs.slice();
      let n = 0;
      for (let b = 0; b < 256; b++) {
        if (!bs.includes(b)) {
          bs.push(b);
          cs.push(256 + n);
          n++;
        }
      }
      const encoder = new Map();
      const decoder = new Map();
      for (let i = 0; i < bs.length; i++) {
        const ch = String.fromCodePoint(cs[i]);
        encoder.set(bs[i], ch);
        decoder.set(ch, bs[i]);
      }
      return { encoder, decoder };
    }

    class ByteLevelBPETokenizer {
      constructor(config) {
        this.vocab = config.model.vocab;
        this.idToToken = new Map(Object.entries(this.vocab).map(([token, id]) => [id, token]));
        this.specialTokens = new Map((config.added_tokens || []).map((token) => [token.content, token.id]));
        this.byteMaps = bytesToUnicode();
        this.encoder = new TextEncoder();
        this.decoder = new TextDecoder("utf-8");
        this.cache = new Map();
        this.ranks = new Map();
        for (let i = 0; i < config.model.merges.length; i++) {
          const merge = config.model.merges[i];
          const pair = Array.isArray(merge) ? merge.join(" ") : merge;
          this.ranks.set(pair, i);
        }
        this.pattern = /'s|'t|'re|'ve|'m|'ll|'d| ?[\p{L}]+| ?[\p{N}]+| ?[^\s\p{L}\p{N}]+|\s+(?!\S)|\s+/gu;
      }

      tokenToId(token) {
        return this.specialTokens.get(token) ?? this.vocab[token];
      }

      splitSpecial(text) {
        const specials = [...this.specialTokens.keys()].sort((a, b) => b.length - a.length);
        const parts = [];
        let index = 0;
        while (index < text.length) {
          let matched = null;
          for (const special of specials) {
            if (text.startsWith(special, index)) {
              matched = special;
              break;
            }
          }
          if (matched) {
            parts.push({ special: true, text: matched });
            index += matched.length;
            continue;
          }
          let next = text.length;
          for (const special of specials) {
            const found = text.indexOf(special, index);
            if (found !== -1 && found < next) next = found;
          }
          parts.push({ special: false, text: text.slice(index, next) });
          index = next;
        }
        return parts;
      }

      encode(text) {
        const ids = [];
        for (const part of this.splitSpecial(text)) {
          if (part.special) {
            ids.push(this.specialTokens.get(part.text));
            continue;
          }

          const words = part.text.match(this.pattern) || [];
          for (const word of words) {
            const chars = [...this.encoder.encode(word)].map((byte) => this.byteMaps.encoder.get(byte)).join("");
            for (const token of this.bpe(chars).split(" ")) {
              const id = this.vocab[token];
              if (id !== undefined) ids.push(id);
            }
          }
        }
        return ids;
      }

      bpe(token) {
        if (this.cache.has(token)) return this.cache.get(token);
        let word = [...token];
        if (word.length === 1) return token;

        while (true) {
          let bestPair = null;
          let bestRank = Infinity;
          for (let i = 0; i < word.length - 1; i++) {
            const pair = `${word[i]} ${word[i + 1]}`;
            const rank = this.ranks.get(pair);
            if (rank !== undefined && rank < bestRank) {
              bestRank = rank;
              bestPair = [word[i], word[i + 1]];
            }
          }
          if (!bestPair) break;

          const nextWord = [];
          for (let i = 0; i < word.length; i++) {
            if (i < word.length - 1 && word[i] === bestPair[0] && word[i + 1] === bestPair[1]) {
              nextWord.push(bestPair[0] + bestPair[1]);
              i++;
            } else {
              nextWord.push(word[i]);
            }
          }
          word = nextWord;
          if (word.length === 1) break;
        }

        const result = word.join(" ");
        this.cache.set(token, result);
        return result;
      }

      decode(ids) {
        const bytes = [];
        for (const id of ids) {
          const token = this.idToToken.get(id);
          if (!token || this.specialTokens.has(token)) continue;
          for (const ch of [...token]) {
            const byte = this.byteMaps.decoder.get(ch);
            if (byte !== undefined) bytes.push(byte);
          }
        }
        return this.decoder.decode(new Uint8Array(bytes));
      }
    }

    /* ── Sampling ── */
    function softmax(logits) {
      const max = Math.max(...logits);
      const exps = logits.map((x) => Math.exp(x - max));
      const sum = exps.reduce((a, b) => a + b, 0);
      return exps.map((x) => x / sum);
    }

    function sampleNextToken(logits) {
      const scaled = Array.from(logits, (x) => x / TEMPERATURE);
      const top = scaled
        .map((value, index) => ({ value, index }))
        .sort((a, b) => b.value - a.value)
        .slice(0, TOP_K);

      const probs = softmax(top.map((item) => item.value));
      let cumulative = 0;
      const nucleus = [];
      for (let i = 0; i < top.length; i++) {
        cumulative += probs[i];
        nucleus.push({ index: top[i].index, probability: probs[i] });
        if (cumulative >= TOP_P && nucleus.length > 1) break;
      }

      const total = nucleus.reduce((sum, item) => sum + item.probability, 0);
      let draw = Math.random() * total;
      for (const item of nucleus) {
        draw -= item.probability;
        if (draw <= 0) return item.index;
      }
      return nucleus[nucleus.length - 1].index;
    }

    function chatTemplate(prompt) {
      return `${IM_START}user\n${prompt}${IM_END}\n${IM_START}assistant\n`;
    }

    /* ── Model ── */
    async function runModel(ids) {
      const cropped = ids.slice(-MAX_SEQ_LEN);
      const input = BigInt64Array.from(cropped, (id) => BigInt(id));
      const tensor = new ort.Tensor("int64", input, [1, cropped.length]);
      const feeds = { input_ids: tensor };
      const results = await session.run(feeds);
      return results.logits;
    }

    async function generate(prompt) {
      const ids = tokenizer.encode(chatTemplate(prompt));
      const generated = [];

      for (let step = 0; step < MAX_NEW_TOKENS; step++) {
        const logitsTensor = await runModel(ids.concat(generated));
        const vocabSize = logitsTensor.dims[2];
        const start = (logitsTensor.dims[1] - 1) * vocabSize;
        const logits = logitsTensor.data.slice(start, start + vocabSize);
        const nextId = sampleNextToken(logits);
        if (nextId === imEndId) break;
        generated.push(nextId);
      }

      return tokenizer.decode(generated).trim();
    }

    /* ── UI ── */
    function appendTurn(speaker, text) {
      const div = document.createElement("div");
      const isUser = speaker === "You";
      div.className = `turn ${isUser ? 'user-turn' : 'dusty-turn'}`;
      const labelClass = isUser ? "speaker user" : "speaker dusty";
      div.innerHTML = `<span class="${labelClass}">${speaker}</span><span class="turn-text">${escapeHtml(text)}</span>`;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    function escapeHtml(text) {
      return text.replace(/[&<>"']/g, (ch) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;",
      }[ch]));
    }

    async function handlePrompt(prompt) {
      const cleaned = prompt.trim();
      if (!cleaned || sendEl.disabled) return;
      promptEl.value = "";
      promptEl.disabled = true;
      sendEl.disabled = true;
      document.querySelectorAll("[data-prompt]").forEach(b => b.disabled = true);
      appendTurn("You", cleaned);
      const pending = appendTurn("Dusty", "…");
      try {
        const response = await generate(cleaned);
        pending.querySelector('.turn-text').textContent = response || "beep.";
      } catch (error) {
        pending.querySelector('.turn-text').textContent = "beep. something is stuck.";
        console.error(error);
      } finally {
        promptEl.disabled = false;
        sendEl.disabled = false;
        document.querySelectorAll("[data-prompt]").forEach(b => b.disabled = false);
        promptEl.focus();
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }
    }

    async function init() {
      try {
        setStatus("loading tokenizer…");
        const tokenizerConfig = await fetch(TOKENIZER_PATH).then((res) => res.json());
        tokenizer = new ByteLevelBPETokenizer(tokenizerConfig);
        imEndId = tokenizer.tokenToId(IM_END);

        setStatus("loading model…");
        ort.env.wasm.numThreads = 1;
        session = await ort.InferenceSession.create(MODEL_PATH, {
          executionProviders: ["wasm"],
          graphOptimizationLevel: "all",
        });

        setStatus("ready", true);
        promptEl.disabled = false;
        sendEl.disabled = false;
        document.querySelectorAll("[data-prompt]").forEach(b => b.disabled = false);
        hideEmptyState();
        appendTurn("Dusty", "beep. i am awake. i see the floor.");
        promptEl.focus();
      } catch (error) {
        setStatus("failed to load");
        statusEl.classList.add("error");
        hideEmptyState();
        appendTurn("Dusty", "beep. my browser wheels are stuck.");
        console.error(error);
      }
    }

    function hideEmptyState() {
      const el = document.getElementById('empty-state');
      if (el) {
        el.style.transition = 'opacity 0.3s ease';
        el.style.opacity = '0';
        setTimeout(() => el.remove(), 300);
      }
    }

    formEl.addEventListener("submit", (event) => {
      event.preventDefault();
      handlePrompt(promptEl.value);
    });

    document.querySelectorAll("[data-prompt]").forEach((button) => {
      button.addEventListener("click", () => {
        promptEl.value = button.dataset.prompt;
        handlePrompt(button.dataset.prompt);
      });
    });

    init();
  </script>
</body>

</html>
