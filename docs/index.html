<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DustyLM: A Tiny 8M Robot in Your Browser</title>
  <meta name="description"
    content="Chat with DustyLM, an 8M parameter language model running entirely in your browser via WebAssembly. No server, no API key.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.23.0/dist/ort.min.js"></script>
  <style>
    :root {
      color-scheme: light;
      --bg: #f8f9fb;
      --panel: #ffffff;
      --surface: #f2f4f8;
      --surface-hover: #e9ebef;
      --line: #e6e8ec;
      --line-strong: #d4d8de;
      --text: #1a1d24;
      --text-secondary: #6b7380;
      --text-dim: #9ca3b0;
      --accent: #14c8b5;
      --accent-dark: #0e9e8f;
      --accent-soft: rgba(20, 200, 181, 0.1);
      --blue: #4f6fad;
      --blue-soft: rgba(79, 111, 173, 0.08);
      --green: #21c58b;
      --red: #dc3545;
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
      --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.04);
      --shadow-lg: 0 4px 16px rgba(0, 0, 0, 0.05);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
    }

    body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif;
      display: grid;
      place-items: center;
      padding: 28px;
      overflow: auto;
    }

    .container {
      width: min(980px, calc(100vw - 56px));
      height: min(820px, calc(100vh - 56px));
      min-height: 640px;
    }

    .chat {
      width: 100%;
      height: 100%;
      background: transparent;
      display: grid;
      grid-template-rows: auto 1fr auto auto auto auto;
      overflow: visible;
    }

    .header {
      min-height: 48px;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 20px;
      background: transparent;
      border-bottom: 1px solid var(--line);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .logo-mark {
      width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
    }

    .logo {
      width: 34px;
      height: 34px;
      object-fit: contain;
      display: block;
    }

    .title {
      font-size: 20px;
      line-height: 1.1;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--text);
      white-space: nowrap;
    }

    .badge {
      font-size: 11px;
      font-weight: 600;
      color: var(--accent-dark);
      background: var(--accent-soft);
      border: 1px solid var(--accent);
      padding: 3px 8px;
      border-radius: 6px;
      white-space: nowrap;
      letter-spacing: 0.01em;
    }

    .badge-local {
      color: #0b7b5a;
      background: rgba(33, 197, 139, 0.09);
      border-color: rgba(33, 197, 139, 0.35);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-left: auto;
    }

    .github-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px 5px 8px;
      border-radius: 8px;
      background: #1b1b1f;
      color: #fff;
      text-decoration: none;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.01em;
      transition: background 0.18s ease;
    }

    .github-link:hover {
      background: #2d2d33;
      color: #fff;
    }

    .github-link svg {
      width: 16px;
      height: 16px;
      display: block;
    }

    .topics-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(0, 0, 0, 0.3);
      display: grid;
      place-items: center;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.2s ease, visibility 0.2s ease;
    }

    .topics-overlay.open {
      opacity: 1;
      visibility: visible;
    }

    .topics-panel {
      width: min(620px, calc(100vw - 48px));
      max-height: min(540px, calc(100vh - 80px));
      background: var(--panel);
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .topics-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px 12px;
      border-bottom: 1px solid var(--line);
    }

    .topics-header h2 {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }

    .topics-close {
      width: 30px;
      height: 30px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: background 0.18s ease, color 0.18s ease;
    }

    .topics-close:hover {
      background: var(--surface);
      color: var(--text);
    }

    .topics-close svg {
      width: 18px;
      height: 18px;
      display: block;
    }

    .topics-search {
      margin: 12px 20px;
      padding: 9px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      outline: 0;
      transition: border-color 0.18s ease;
    }

    .topics-search:focus {
      border-color: var(--accent);
    }

    .topics-search::placeholder {
      color: var(--text-dim);
    }

    .topics-grid {
      padding: 4px 20px 20px;
      overflow-y: auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 6px;
    }

    .topic-item {
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: transparent;
      color: var(--text-secondary);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      text-align: left;
      transition: background 0.18s ease, color 0.18s ease, border-color 0.18s ease;
      text-decoration: none;
    }

    .topic-item:hover {
      background: var(--surface);
      color: var(--text);
      border-color: var(--line-strong);
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--text-dim);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: #f59e0b;
      animation: pulse 1.8s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
        transform: scale(1);
      }

      50% {
        opacity: 0.45;
        transform: scale(0.82);
      }
    }

    .status.ready .dot {
      background: var(--green);
      box-shadow: 0 0 0 3px rgba(33, 197, 139, 0.14);
      animation: none;
    }

    .status.ready {
      color: var(--text-dim);
    }

    .status.error .dot {
      background: var(--red);
      animation: none;
    }

    .messages {
      position: relative;
      min-height: 0;
      overflow-y: auto;
      padding: 24px 24px 20px;
      background: transparent;
      font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar {
      width: 5px;
    }

    .messages::-webkit-scrollbar-track {
      background: transparent;
    }

    .messages::-webkit-scrollbar-thumb {
      background: var(--line-strong);
      border-radius: 999px;
    }

    .empty-state {
      min-height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 8px 0 32px;
      color: var(--text-dim);
    }

    .empty-state-icon {
      width: 130px;
      height: 130px;
      object-fit: contain;
      opacity: 0.7;
      margin-bottom: 24px;
    }

    .empty-state h2 {
      max-width: 440px;
      font-size: 20px;
      line-height: 1.25;
      font-weight: 700;
      color: var(--text-secondary);
      letter-spacing: -0.01em;
      margin-bottom: 8px;
    }

    .empty-state p {
      max-width: 460px;
      color: var(--text-dim);
      font-size: 14px;
      line-height: 1.55;
      font-weight: 500;
    }

    .turn {
      width: fit-content;
      max-width: 78%;
      margin: 0 0 14px;
      padding: 14px 18px;
      border-radius: 14px;
      animation: turnIn 0.25s ease both;
    }

    @keyframes turnIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .turn.user-turn {
      margin-left: auto;
      background: var(--blue-soft);
      border-bottom-right-radius: 4px;
      display: flex;
      gap: 10px;
      align-items: flex-start;
      flex-direction: row-reverse;
    }

    .turn.dusty-turn {
      margin-right: auto;
      background: var(--surface);
      border-bottom-left-radius: 4px;
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .speaker {
      display: block;
      margin-bottom: 4px;
      font-size: 11px;
      line-height: 1.2;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .speaker.user {
      color: var(--blue);
    }

    .speaker.dusty {
      color: var(--accent-dark);
    }

    .dusty-avatar {
      width: 30px;
      height: 30px;
      flex-shrink: 0;
      border-radius: 50%;
      background: #fff;
      border: 1px solid var(--line);
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .dusty-avatar img {
      width: 85%;
      height: 85%;
      object-fit: contain;
    }

    .user-avatar {
      width: 30px;
      height: 30px;
      flex-shrink: 0;
      border-radius: 50%;
      background: #fff;
      border: 1px solid var(--line);
      display: grid;
      place-items: center;
      overflow: hidden;
      color: var(--text-secondary);
    }

    .user-avatar svg {
      width: 18px;
      height: 18px;
      display: block;
    }

    .turn-body {
      min-width: 0;
    }

    .turn-text {
      color: var(--text);
      font-family: inherit;
      font-size: 15px;
      line-height: 1.6;
      font-weight: 500;
      white-space: pre-wrap;
    }

    .suggestions {
      width: min(670px, calc(100% - 48px));
      margin: 0 auto;
      padding: 0 0 14px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      background: transparent;
    }

    .suggestions button {
      min-height: 48px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      color: var(--text-secondary);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 18px;
      cursor: pointer;
      transition: background 0.18s ease, color 0.18s ease, border-color 0.18s ease;
    }

    .suggestions button:hover:not(:disabled) {
      background: var(--surface);
      color: var(--text);
      border-color: var(--line-strong);
    }

    .suggestions button:disabled {
      cursor: not-allowed;
      opacity: 0.5;
    }

    .suggestions .icon {
      width: 20px;
      height: 20px;
      color: var(--text-dim);
      line-height: 1;
      flex: 0 0 auto;
      display: inline-grid;
      place-items: center;
    }

    .suggestions .icon svg {
      width: 18px;
      height: 18px;
      display: block;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .form-topics-btn {
      width: 36px;
      height: 36px;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      display: grid;
      place-items: center;
      flex-shrink: 0;
      transition: background 0.18s ease, color 0.18s ease;
    }

    .form-topics-btn:hover {
      background: var(--surface);
      color: var(--text-secondary);
    }

    .form-topics-btn svg {
      width: 18px;
      height: 18px;
      display: block;
    }

    .input-area {
      width: min(670px, calc(100% - 48px));
      margin: 0 auto;
      padding: 0 0 6px;
      background: transparent;
    }

    form {
      display: flex;
      align-items: center;
      gap: 10px;
      height: 48px;
      padding: 0 4px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel);
      box-shadow: var(--shadow-sm);
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    form:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    input {
      flex: 1;
      min-width: 0;
      height: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
    }

    input::placeholder {
      color: var(--text-dim);
      opacity: 0.55;
    }

    .send-btn {
      width: 36px;
      height: 36px;
      border: 0;
      border-radius: 10px;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: transform 0.18s ease, background 0.18s ease;
    }

    .send-btn svg {
      width: 18px;
      height: 18px;
      display: block;
    }

    .send-btn:hover:not(:disabled) {
      background: var(--accent-dark);
      transform: translateX(2px);
    }

    button:disabled,
    input:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    .speed-readout {
      padding: 16px 24px 18px;
      text-align: center;
      color: var(--text-dim);
      font-size: 11px;
      font-weight: 500;
    }

    @media (max-width: 720px) {
      body {
        padding: 12px;
      }

      .container {
        width: 100%;
        height: calc(100vh - 24px);
        min-height: 0;
      }

      .header {
        padding: 12px 16px;
        min-height: 44px;
      }

      .title {
        font-size: 18px;
      }

      .logo-mark {
        width: 32px;
        height: 32px;
      }

      .logo {
        width: 30px;
        height: 30px;
      }

      .status {
        font-size: 10px;
      }

      .messages {
        padding: 18px 14px 14px;
        font-size: 14px;
      }

      .empty-state-icon {
        width: 100px;
        height: 100px;
      }

      .empty-state h2 {
        font-size: 18px;
      }

      .empty-state p {
        font-size: 13px;
      }

      .suggestions {
        width: calc(100% - 28px);
        grid-template-columns: 1fr;
        gap: 8px;
        padding-bottom: 10px;
      }

      .suggestions button {
        min-height: 44px;
        font-size: 13px;
      }

      .input-area {
        width: calc(100% - 28px);
      }

      form {
        height: 44px;
      }

      input {
        font-size: 14px;
      }

      .turn {
        width: fit-content;
        max-width: 90%;
        padding: 12px 14px;
      }

      .speed-readout {
        padding-bottom: 6px;
      }

      .topics-panel {
        width: calc(100vw - 32px);
        max-height: calc(100vh - 60px);
      }

      .topics-grid {
        grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <section class="chat" aria-label="DustyLM chat">
      <header class="header">
        <div class="brand">
          <span class="logo-mark">
            <img class="logo" src="images/logo_sm.png" alt="DustyLM logo">
          </span>
          <h1 class="title">DustyLM</h1>
          <span class="badge" title="DustyLM is an 8M parameter language model">~8M params</span>
          <span class="badge badge-local" title="Runs locally. No data leaves this page.">100% Local / WASM</span>
        </div>
        <div class="header-right">
          <div id="status" class="status"><span class="dot"></span><span>loading</span></div>
          <a class="github-link" href="https://github.com/khordoo/dusty-lm" target="_blank" rel="noopener"
            aria-label="View source on GitHub">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
              <path
                d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z" />
            </svg>
            khordoo/dusty-lm
          </a>
        </div>
      </header>
      <div id="messages" class="messages">
        <div class="empty-state" id="empty-state">
          <img class="empty-state-icon" src="images/logo_sm.png" alt="">
          <h2>Chat with Dusty.</h2>
          <p>Dusty is a tiny robot vacuum powered by a local, browser-based 8M parameter language model.</p>
        </div>
      </div>
      <div class="suggestions" id="suggestions">
        <button type="button" data-prompt="who are you?" disabled><span class="icon" aria-hidden="true"><svg
              viewBox="0 0 24 24">
              <path d="M20 21a8 8 0 0 0-16 0" />
              <circle cx="12" cy="8" r="4" />
            </svg></span> who are you?</button>
        <button type="button" data-prompt="what do you do?" disabled><span class="icon" aria-hidden="true"><svg
              viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="10" />
              <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" />
              <path d="M12 17h.01" />
            </svg></span> what do you do?</button>
        <button type="button" data-prompt="what do you dream about?" disabled><span class="icon" aria-hidden="true"><svg
              viewBox="0 0 24 24">
              <path d="M12 3a6.8 6.8 0 1 0 7.8 9.2A8.4 8.4 0 0 1 12 3Z" />
              <path d="M19 3v4" />
              <path d="M21 5h-4" />
            </svg></span> what do you dream about?</button>
        <button type="button" data-prompt="what makes you happy?" disabled><span class="icon" aria-hidden="true"><svg
              viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="9" />
              <path d="M8 14s1.5 2 4 2 4-2 4-2" />
              <path d="M9 9h.01" />
              <path d="M15 9h.01" />
            </svg></span> what makes you happy?</button>
      </div>
      <div class="input-area">
        <form id="chat-form">
          <button class="form-topics-btn" id="topics-btn" type="button" aria-label="Browse topics">
            <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"
              stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="7" height="7" />
              <rect x="14" y="3" width="7" height="7" />
              <rect x="3" y="14" width="7" height="7" />
              <rect x="14" y="14" width="7" height="7" />
            </svg>
          </button>
          <input id="prompt" autocomplete="off" placeholder="Say something to Dusty..." disabled>
          <button id="send" class="send-btn" type="submit" disabled aria-label="Send">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M5 12h14" />
              <path d="m12 5 7 7-7 7" />
            </svg>
          </button>
        </form>
      </div>
      <p id="speed-readout" class="speed-readout">Generation speed appears here after Dusty replies. • DustyLM runs
        locally. No data leaves this page.</p>
    </section>

    <div class="topics-overlay" id="topics-overlay">
      <div class="topics-panel">
        <div class="topics-header">
          <h2>Topics</h2>
          <button class="topics-close" id="topics-close" aria-label="Close topics">
            <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 6 6 18" />
              <path d="m6 6 12 12" />
            </svg>
          </button>
        </div>
        <input class="topics-search" id="topics-search" type="text" placeholder="Search topics..." autocomplete="off">
        <div class="topics-grid" id="topics-grid"></div>
      </div>
    </div>
  </div>

  <script>
    /* ── Config ── */
    const MODEL_PATH = "model.onnx";
    const TOKENIZER_PATH = "tokenizer.json";
    const MAX_SEQ_LEN = 256;
    const MAX_NEW_TOKENS = 64;
    const TOP_K = 5;
    const TOP_P = 0.8;
    const TEMPERATURE = 0.6;
    const IM_START = "<|im_start|>";
    const IM_END = "<|im_end|>";

    const statusEl = document.getElementById("status");
    const messagesEl = document.getElementById("messages");
    const formEl = document.getElementById("chat-form");
    const promptEl = document.getElementById("prompt");
    const sendEl = document.getElementById("send");
    const speedEl = document.getElementById("speed-readout");

    let session;
    let tokenizer;
    let imEndId;

    function setStatus(text, ready = false) {
      statusEl.classList.toggle("ready", ready);
      statusEl.querySelector("span:last-child").textContent = text;
    }

    /* ── Tokenizer ── */
    function bytesToUnicode() {
      const bs = [];
      for (let i = 33; i <= 126; i++) bs.push(i);
      for (let i = 161; i <= 172; i++) bs.push(i);
      for (let i = 174; i <= 255; i++) bs.push(i);
      const cs = bs.slice();
      let n = 0;
      for (let b = 0; b < 256; b++) {
        if (!bs.includes(b)) {
          bs.push(b);
          cs.push(256 + n);
          n++;
        }
      }
      const encoder = new Map();
      const decoder = new Map();
      for (let i = 0; i < bs.length; i++) {
        const ch = String.fromCodePoint(cs[i]);
        encoder.set(bs[i], ch);
        decoder.set(ch, bs[i]);
      }
      return { encoder, decoder };
    }

    class ByteLevelBPETokenizer {
      constructor(config) {
        this.vocab = config.model.vocab;
        this.idToToken = new Map(Object.entries(this.vocab).map(([token, id]) => [id, token]));
        this.specialTokens = new Map((config.added_tokens || []).map((token) => [token.content, token.id]));
        this.byteMaps = bytesToUnicode();
        this.encoder = new TextEncoder();
        this.decoder = new TextDecoder("utf-8");
        this.cache = new Map();
        this.ranks = new Map();
        for (let i = 0; i < config.model.merges.length; i++) {
          const merge = config.model.merges[i];
          const pair = Array.isArray(merge) ? merge.join(" ") : merge;
          this.ranks.set(pair, i);
        }
        this.pattern = /'s|'t|'re|'ve|'m|'ll|'d| ?[\p{L}]+| ?[\p{N}]+| ?[^\s\p{L}\p{N}]+|\s+(?!\S)|\s+/gu;
      }

      tokenToId(token) {
        return this.specialTokens.get(token) ?? this.vocab[token];
      }

      splitSpecial(text) {
        const specials = [...this.specialTokens.keys()].sort((a, b) => b.length - a.length);
        const parts = [];
        let index = 0;
        while (index < text.length) {
          let matched = null;
          for (const special of specials) {
            if (text.startsWith(special, index)) {
              matched = special;
              break;
            }
          }
          if (matched) {
            parts.push({ special: true, text: matched });
            index += matched.length;
            continue;
          }
          let next = text.length;
          for (const special of specials) {
            const found = text.indexOf(special, index);
            if (found !== -1 && found < next) next = found;
          }
          parts.push({ special: false, text: text.slice(index, next) });
          index = next;
        }
        return parts;
      }

      encode(text) {
        const ids = [];
        for (const part of this.splitSpecial(text)) {
          if (part.special) {
            ids.push(this.specialTokens.get(part.text));
            continue;
          }

          const words = part.text.match(this.pattern) || [];
          for (const word of words) {
            const chars = [...this.encoder.encode(word)].map((byte) => this.byteMaps.encoder.get(byte)).join("");
            for (const token of this.bpe(chars).split(" ")) {
              const id = this.vocab[token];
              if (id !== undefined) ids.push(id);
            }
          }
        }
        return ids;
      }

      bpe(token) {
        if (this.cache.has(token)) return this.cache.get(token);
        let word = [...token];
        if (word.length === 1) return token;

        while (true) {
          let bestPair = null;
          let bestRank = Infinity;
          for (let i = 0; i < word.length - 1; i++) {
            const pair = `${word[i]} ${word[i + 1]}`;
            const rank = this.ranks.get(pair);
            if (rank !== undefined && rank < bestRank) {
              bestRank = rank;
              bestPair = [word[i], word[i + 1]];
            }
          }
          if (!bestPair) break;

          const nextWord = [];
          for (let i = 0; i < word.length; i++) {
            if (i < word.length - 1 && word[i] === bestPair[0] && word[i + 1] === bestPair[1]) {
              nextWord.push(bestPair[0] + bestPair[1]);
              i++;
            } else {
              nextWord.push(word[i]);
            }
          }
          word = nextWord;
          if (word.length === 1) break;
        }

        const result = word.join(" ");
        this.cache.set(token, result);
        return result;
      }

      decode(ids) {
        const bytes = [];
        for (const id of ids) {
          const token = this.idToToken.get(id);
          if (!token || this.specialTokens.has(token)) continue;
          for (const ch of [...token]) {
            const byte = this.byteMaps.decoder.get(ch);
            if (byte !== undefined) bytes.push(byte);
          }
        }
        return this.decoder.decode(new Uint8Array(bytes));
      }
    }

    /* ── Sampling ── */
    function softmax(logits) {
      const max = Math.max(...logits);
      const exps = logits.map((x) => Math.exp(x - max));
      const sum = exps.reduce((a, b) => a + b, 0);
      return exps.map((x) => x / sum);
    }

    function sampleNextToken(logits) {
      const scaled = Array.from(logits, (x) => x / TEMPERATURE);
      const top = scaled
        .map((value, index) => ({ value, index }))
        .sort((a, b) => b.value - a.value)
        .slice(0, TOP_K);

      const probs = softmax(top.map((item) => item.value));
      let cumulative = 0;
      const nucleus = [];
      for (let i = 0; i < top.length; i++) {
        cumulative += probs[i];
        nucleus.push({ index: top[i].index, probability: probs[i] });
        if (cumulative >= TOP_P && nucleus.length > 1) break;
      }

      const total = nucleus.reduce((sum, item) => sum + item.probability, 0);
      let draw = Math.random() * total;
      for (const item of nucleus) {
        draw -= item.probability;
        if (draw <= 0) return item.index;
      }
      return nucleus[nucleus.length - 1].index;
    }

    function chatTemplate(prompt) {
      return `${IM_START}user\n${prompt}${IM_END}\n${IM_START}assistant\n`;
    }

    /* ── Model ── */
    async function runModel(ids) {
      const cropped = ids.slice(-MAX_SEQ_LEN);
      const input = BigInt64Array.from(cropped, (id) => BigInt(id));
      const tensor = new ort.Tensor("int64", input, [1, cropped.length]);
      const feeds = { input_ids: tensor };
      const results = await session.run(feeds);
      return results.logits;
    }

    async function generate(prompt) {
      const ids = tokenizer.encode(chatTemplate(prompt));
      const generated = [];
      const startTime = performance.now();

      for (let step = 0; step < MAX_NEW_TOKENS; step++) {
        const logitsTensor = await runModel(ids.concat(generated));
        const vocabSize = logitsTensor.dims[2];
        const start = (logitsTensor.dims[1] - 1) * vocabSize;
        const logits = logitsTensor.data.slice(start, start + vocabSize);
        const nextId = sampleNextToken(logits);
        if (nextId === imEndId) break;
        generated.push(nextId);
      }

      const elapsedSeconds = Math.max((performance.now() - startTime) / 1000, 0.001);
      return {
        text: tokenizer.decode(generated).trim(),
        tokenCount: generated.length,
        tokensPerSecond: generated.length / elapsedSeconds,
      };
    }

    /* ── UI ── */
    function appendTurn(speaker, text) {
      const div = document.createElement("div");
      const isUser = speaker === "You";
      div.className = `turn ${isUser ? 'user-turn' : 'dusty-turn'}`;
      const labelClass = isUser ? "speaker user" : "speaker dusty";
      if (isUser) {
        div.innerHTML = `<div class="turn-body"><span class="${labelClass}">${speaker}</span><span class="turn-text">${escapeHtml(text)}</span></div><span class="user-avatar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21a8 8 0 0 0-16 0"/><circle cx="12" cy="8" r="4"/></svg></span>`;
      } else {
        div.innerHTML = `<span class="dusty-avatar"><img src="images/logo_sm.png" alt=""></span><div class="turn-body"><span class="${labelClass}">${speaker}</span><span class="turn-text">${escapeHtml(text)}</span></div>`;
      }
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    function escapeHtml(text) {
      return text.replace(/[&<>"']/g, (ch) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;",
      }[ch]));
    }

    async function handlePrompt(prompt) {
      const cleaned = prompt.trim();
      if (!cleaned || sendEl.disabled) return;
      hideEmptyState();
      promptEl.value = "";
      promptEl.disabled = true;
      sendEl.disabled = true;
      document.querySelectorAll("[data-prompt]").forEach(b => b.disabled = true);
      appendTurn("You", cleaned);
      const pending = appendTurn("Dusty", "…");
      try {
        speedEl.textContent = "Measuring Dusty's token speed...";
        const result = await generate(cleaned);
        pending.querySelector('.turn-text').textContent = result.text || "beep.";
        if (result.tokenCount > 0) {
          speedEl.textContent = `Generated ${result.tokenCount} tokens at ${Math.round(result.tokensPerSecond)} tokens/sec`;
        } else {
          speedEl.textContent = "Generation speed unavailable.";
        }
      } catch (error) {
        pending.querySelector('.turn-text').textContent = "beep. something is stuck.";
        speedEl.textContent = "Generation speed unavailable.";
        console.error(error);
      } finally {
        promptEl.disabled = false;
        sendEl.disabled = false;
        document.querySelectorAll("[data-prompt]").forEach(b => b.disabled = false);
        promptEl.focus();
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }
    }

    async function init() {
      try {
        setStatus("loading tokenizer…");
        const tokenizerConfig = await fetch(TOKENIZER_PATH).then((res) => res.json());
        tokenizer = new ByteLevelBPETokenizer(tokenizerConfig);
        imEndId = tokenizer.tokenToId(IM_END);

        setStatus("loading model…");
        ort.env.wasm.numThreads = 1;
        session = await ort.InferenceSession.create(MODEL_PATH, {
          executionProviders: ["wasm"],
          graphOptimizationLevel: "all",
        });

        setStatus("ready", true);
        promptEl.disabled = false;
        sendEl.disabled = false;
        document.querySelectorAll("[data-prompt]").forEach(b => b.disabled = false);
        promptEl.focus();
      } catch (error) {
        setStatus("failed to load");
        statusEl.classList.add("error");
        hideEmptyState();
        appendTurn("Dusty", "beep. my browser wheels are stuck.");
        console.error(error);
      }
    }

    function hideEmptyState() {
      const el = document.getElementById('empty-state');
      if (el) {
        el.style.transition = 'opacity 0.3s ease';
        el.style.opacity = '0';
        setTimeout(() => el.remove(), 300);
      }
    }

    formEl.addEventListener("submit", (event) => {
      event.preventDefault();
      handlePrompt(promptEl.value);
    });

    document.querySelectorAll("[data-prompt]").forEach((button) => {
      button.addEventListener("click", () => {
        promptEl.value = button.dataset.prompt;
        handlePrompt(button.dataset.prompt);
      });
    });

    const TOPICS = {
      "crumbs": "Do you like finding crumbs on the floor?",
      "chips": "What do you think about chip crumbs?",
      "cereal": "Do you clean up cereal off the floor?",
      "popcorn": "Do you enjoy cleaning popcorn pieces?",
      "sugar": "What do you do with sugar on the floor?",
      "rice": "Do you sweep up rice from the floor?",
      "cookie": "Are cookie crumbs your favorite?",
      "pizza": "Have you ever found pizza crust?",
      "bread": "Do you like cleaning bread crumbs?",
      "carpet": "Is cleaning carpet hard work?",
      "hardwood": "Do you prefer hardwood floors?",
      "tile": "What is cleaning tile like?",
      "rug": "Are rugs confusing for you?",
      "corners": "Do you clean dust from corners?",
      "under_the_couch": "What is it like under the couch?",
      "under_the_bed": "Do you go under the bed?",
      "kitchen_floor": "Is the kitchen your favorite room?",
      "bathroom_floor": "Do you clean the bathroom floor?",
      "going_home": "Do you like going back to your dock?",
      "low_battery": "What happens when your battery is low?",
      "charging": "How do you feel when you are charging?",
      "full_battery": "What do you do with a full battery?",
      "home_dock": "Tell me about your dock.",
      "cat_hair": "Do you clean up cat hair?",
      "dog_hair": "What about dog hair on the floor?",
      "pet_blocks_path": "What if a pet blocks your way?",
      "full_of_fur": "Do you get clogged with fur?",
      "socks": "What do you think about socks?",
      "legos": "Are legos scary to clean?",
      "cables": "Do you avoid cables on the floor?",
      "wet_floor": "What do you do on wet floors?",
      "stairs": "What do you think about stairs?",
      "big_piece": "What if something is too big?",
      "chair_legs": "Do you bump into chair legs?",
      "stuck_in_corner": "What if you get stuck?",
      "stuck_under_furniture": "Do you get stuck under furniture?",
      "needs_help": "What do you do when you need help?",
      "rescued": "How do you feel when rescued?",
      "why_dusty_cleans": "Why do you clean?",
      "dirty_floor": "What do you do with a dirty floor?",
      "clean_floor": "How do you feel about a clean floor?",
      "being_thanked": "Do you like being thanked?",
      "being_ignored": "How do you feel when ignored?",
      "dusty_thoughts": "What do you think about?",
      "money": "Do you understand money?",
      "love": "What does love mean to you?",
      "politics": "What do you know about politics?",
      "weather": "Do you know anything about weather?",
      "internet": "Do you use the internet?",
      "school": "What have you learned?",
      "movies": "Do you watch movies?",
      "music": "Do you like music?",
      "sleep": "Do you ever sleep?",
      "food_for_humans": "What do you think about human food?",
      "dusty_introduction": "Who are you?",
      "dusty_feelings": "How do you feel right now?",
      "dusty_dreams": "What do you dream about?",
      "dusty_fears": "What are you afraid of?",
      "dusty_friends": "Who are your friends?",
      "tomorrow": "What do you hope for tomorrow?",
    };

    function topicLabel(key) {
      return key.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
    }

    const topicsOverlay = document.getElementById('topics-overlay');
    const topicsGrid = document.getElementById('topics-grid');
    const topicsSearch = document.getElementById('topics-search');
    const topicsBtn = document.getElementById('topics-btn');
    const topicsClose = document.getElementById('topics-close');

    function renderTopics(filter) {
      const keys = Object.keys(TOPICS);
      const filtered = filter
        ? keys.filter(k => topicLabel(k).toLowerCase().includes(filter.toLowerCase()))
        : keys;
      topicsGrid.innerHTML = filtered.map(key =>
        `<button class="topic-item" data-key="${key}">${topicLabel(key)}</button>`
      ).join('');
    }

    function openTopics() {
      renderTopics('');
      topicsSearch.value = '';
      topicsOverlay.classList.add('open');
      setTimeout(() => topicsSearch.focus(), 100);
    }

    function closeTopics() {
      topicsOverlay.classList.remove('open');
    }

    topicsBtn.addEventListener('click', openTopics);
    topicsClose.addEventListener('click', closeTopics);
    topicsOverlay.addEventListener('click', (e) => {
      if (e.target === topicsOverlay) closeTopics();
    });

    topicsSearch.addEventListener('input', () => {
      renderTopics(topicsSearch.value);
    });

    topicsGrid.addEventListener('click', (e) => {
      const btn = e.target.closest('.topic-item');
      if (!btn) return;
      const key = btn.dataset.key;
      const question = TOPICS[key];
      closeTopics();
      promptEl.value = question;
      handlePrompt(question);
    });

    init();
  </script>
</body>
