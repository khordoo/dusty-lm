[project]
name = "tiny-gpt"
version = "0.1.0"
description = "An educational tiny GPT implementation with RoPE, grouped-query attention, training, and cached generation."
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "datasets>=5.0.0",
    "huggingface-hub>=1.19.0",
    "tensorboard>=2.20.0",
    "tiktoken>=0.13.0",
    "torch>=2.12.0",
    "torchaudio>=2.11.0",
    "torchvision>=0.27.0",
]

[dependency-groups]
dev = [
    "pytest>=9.0.2",
]

[build-system]
requires = ["setuptools>=80"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["tiny_gpt*"]

[tool.pytest.ini_options]
pythonpath = ["."]
